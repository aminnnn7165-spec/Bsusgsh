<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پنل نمایشی V2Ray</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        
        /* هدر و تب‌ها */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            background: rgba(255,255,255,0.05);
            padding: 10px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }
        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: transparent;
            color: rgba(255,255,255,0.5);
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
        }
        .tab-btn.active {
            background: rgba(255,255,255,0.15);
            color: #fff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .tab-btn:hover { color: #fff; }
        
        /* پنل‌ها */
        .panel {
            display: none;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid rgba(255,255,255,0.1);
            animation: fadeIn 0.4s ease;
        }
        .panel.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        h2 {
            text-align: center;
            margin-bottom: 25px;
            font-weight: 300;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        /* استایل کارت‌های آمار */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }
        .stat-card {
            background: rgba(255,255,255,0.08);
            padding: 18px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .stat-card span { display: block; font-size: 13px; opacity: 0.6; margin-bottom: 5px; }
        .stat-card .value { font-size: 24px; font-weight: bold; }
        .stat-card .value.green { background: linear-gradient(90deg, #00b09b, #96c93d); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .stat-card .value.blue { background: linear-gradient(90deg, #00d2ff, #3a7bd5); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .stat-card .value.orange { background: linear-gradient(90deg, #f7971e, #ffd200); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* جدول */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            font-size: 13px;
        }
        th, td {
            padding: 12px 10px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        th {
            background: rgba(255,255,255,0.05);
            font-weight: 300;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .status {
            padding: 3px 14px;
            border-radius: 20px;
            font-size: 12px;
            display: inline-block;
        }
        .status.online { background: #00b09b; }
        .status.offline { background: #e94560; }
        .ping { color: #96c93d; font-weight: bold; }
        .load-bar {
            width: 60px;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            display: inline-block;
            overflow: hidden;
            vertical-align: middle;
        }
        .load-fill {
            height: 100%;
            background: linear-gradient(90deg, #00b09b, #96c93d);
            border-radius: 10px;
        }
        .btn {
            background: rgba(255,255,255,0.1);
            border: none;
            color: #fff;
            padding: 5px 14px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 12px;
            transition: 0.3s;
        }
        .btn:hover { background: rgba(255,255,255,0.25); }
        .btn.danger:hover { background: #e94560; }
        
        /* ادمین اضافه */
        .admin-badge {
            background: #e94560;
            padding: 2px 12px;
            border-radius: 12px;
            font-size: 11px;
        }
        @media (max-width: 700px) {
            .panel { padding: 15px; }
            table { font-size: 11px; }
            th, td { padding: 8px 5px; }
        }
    </style>
</head>
<body>
<div class="container">
    
    <!-- تب‌ها -->
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('user')">👤 کاربر</button>
        <button class="tab-btn" onclick="switchTab('admin')">⚙️ ادمین</button>
    </div>

    <!-- ==================== پنل کاربری ==================== -->
    <div id="userPanel" class="panel active">
        <h2>🚀 پنل V2Ray - نسخه نمایشی</h2>
        
        <div class="stats">
            <div class="stat-card"><span>📦 حجم باقیمانده</span><div class="value green">60,994.97 GB</div></div>
            <div class="stat-card"><span>📊 مصرف شده</span><div class="value orange">139,005.02 GB</div></div>
            <div class="stat-card"><span>⏳ زمان باقیمانده</span><div class="value blue">4 روز</div></div>
            <div class="stat-card"><span>⚡ سرعت متوسط</span><div class="value blue">187 Mbps</div></div>
            <div class="stat-card"><span>✅ وضعیت</span><div class="value green">فعال</div></div>
        </div>

        <table>
            <thead><tr><th>نام</th><th>کشور</th><th>پینگ</th><th>بار</th><th>وضعیت</th><th>عملیات</th></tr></thead>
            <tbody id="userTable"></tbody>
        </table>
    </div>

    <!-- ==================== پنل ادمین ==================== -->
    <div id="adminPanel" class="panel">
        <h2>⚙️ پنل مدیریت - ادمین</h2>
        
        <div class="stats">
            <div class="stat-card"><span>🖥️ کل سرورها</span><div class="value blue">۱۲</div></div>
            <div class="stat-card"><span>✅ آنلاین</span><div class="value green">۱۰</div></div>
            <div class="stat-card"><span>👥 کاربران فعال</span><div class="value orange">۸۴۲</div></div>
            <div class="stat-card"><span>📈 میانگین بار</span><div class="value blue">۱.۲</div></div>
        </div>

        <table>
            <thead><tr><th>سرور</th><th>آیپی</th><th>موقعیت</th><th>وضعیت</th><th>بار</th><th>کاربران</th><th>عملیات</th></tr></thead>
            <tbody id="adminTable"></tbody>
        </table>
    </div>
</div>

<script>
    // ======== تابع تغییر تب ========
    function switchTab(tab) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tab + 'Panel').classList.add('active');
        event.target.classList.add('active');
    }

    // ======== دیتای سرورهای کاربر ========
    const userServers = [
        { name: 'Storm ۱', country: '🇺🇸 آمریکا', ping: 140, load: 35 },
        { name: 'Storm ۲', country: '🇺🇸 آمریکا', ping: 140, load: 35 },
        { name: 'Storm ۳', country: '🇺🇸 آمریکا', ping: 140, load: 35 },
        { name: 'Storm ۴', country: '🇩🇪 آلمان', ping: 50, load: 20 },
        { name: 'Storm ۵', country: '🇩🇪 آلمان', ping: 48, load: 19 },
        { name: 'Storm ۶', country: '🇹🇼 تایوان', ping: 130, load: 32 },
        { name: 'Storm ۷', country: '🇫🇮 فنلاند', ping: 95, load: 28 },
        { name: 'Storm ۸', country: '🇹🇷 ترکیه', ping: 80, load: 26 },
        { name: 'Storm ۹', country: '🇦🇺 استرالیا', ping: 160, load: 38 },
        { name: 'Storm ۱۰', country: '🇫🇷 فرانسه', ping: 85, load: 25 }
    ];

    // ======== دیتای سرورهای ادمین ========
    const adminServers = [
        { name: 'Storm-01', ip: '185.xxx.xxx.1', loc: '🇺🇸 نیویورک', status: 'online', load: '۳۵٪', users: ۸۴ },
        { name: 'Storm-02', ip: '185.xxx.xxx.2', loc: '🇺🇸 نیویورک', status: 'online', load: '۳۵٪', users: ۷۶ },
        { name: 'Storm-03', ip: '185.xxx.xxx.3', loc: '🇺🇸 نیویورک', status: 'online', load: '۳۵٪', users: ۹۲ },
        { name: 'Storm-04', ip: '185.xxx.xxx.4', loc: '🇩🇪 فرانکفورت', status: 'online', load: '۲۰٪', users: ۵۵ },
        { name: 'Storm-05', ip: '185.xxx.xxx.5', loc: '🇩🇪 فرانکفورت', status: 'online', load: '۱۹٪', users: ۴۸ },
        { name: 'Storm-06', ip: '185.xxx.xxx.6', loc: '🇹🇼 تایپه', status: 'online', load: '۳۲٪', users: ۱۱۳ },
        { name: 'Storm-07', ip: '185.xxx.xxx.7', loc: '🇫🇮 هلسینکی', status: 'offline', load: '۰٪', users: ۰ },
        { name: 'Storm-08', ip: '185.xxx.xxx.8', loc: '🇹🇷 استانبول', status: 'online', load: '۲۶٪', users: ۶۷ },
        { name: 'Storm-09', ip: '185.xxx.xxx.9', loc: '🇦🇺 سیدنی', status: 'online', load: '۳۸٪', users: ۱۲۴ },
        { name: 'Storm-10', ip: '185.xxx.xxx.10', loc: '🇫🇷 پاریس', status: 'online', load: '۲۵٪', users: ۹۱ },
        { name: 'Storm-11', ip: '185.xxx.xxx.11', loc: '🇬🇧 لندن', status: 'online', load: '۴۲٪', users: ۱۵۶ },
        { name: 'Storm-12', ip: '185.xxx.xxx.12', loc: '🇨🇦 تورنتو', status: 'offline', load: '۰٪', users: ۰ }
    ];

    // ======== رندر جدول کاربر ========
    const userTbody = document.getElementById('userTable');
    userServers.forEach(s => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td>${s.name}</td>
            <td>${s.country}</td>
            <td class="ping">${s.ping} ms</td>
            <td><div class="load-bar"><div class="load-fill" style="width:${s.load}%"></div></div> ${s.load}%</td>
            <td><span class="status online">فعال</span></td>
            <td><button class="btn">اتصال</button></td>
        `;
        userTbody.appendChild(tr);
    });

    // ======== رندر جدول ادمین ========
    const adminTbody = document.getElementById('adminTable');
    adminServers.forEach(s => {
        const tr = document.createElement('tr');
        const statusClass = s.status === 'online' ? 'online' : 'offline';
        const statusText = s.status === 'online' ? 'آنلاین' : 'آفلاین';
        tr.innerHTML = `
            <td><strong>${s.name}</strong></td>
            <td style="opacity:0.6;">${s.ip}</td>
            <td>${s.loc}</td>
            <td><span class="status ${statusClass}">${statusText}</span></td>
            <td>${s.load}</td>
            <td>${s.users}</td>
            <td>
                <button class="btn">ویرایش</button>
                <button class="btn danger">حذف</button>
            </td>
        `;
        adminTbody.appendChild(tr);
    });
</script>
</body>
  </html>
